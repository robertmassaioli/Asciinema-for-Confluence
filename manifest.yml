modules:
  macro:
    # Module 1: Bodied macro — paste raw .cast content directly into the body
    - key: asciinema-inline
      title: Asciinema Inline
      description: >
        Render an asciinema terminal recording by pasting the .cast file
        contents directly into the macro body.
      resource: main-inline
      resolver:
        function: resolver
      bodyType: plain-text
      categories:
        - media
      config:
        resource: main-inline
        title: Playback Options
        openOnInsert: true

    # Module 2: Standard macro — point at a .cast file attached to the page
    - key: asciinema-attachment
      title: Asciinema Recording
      description: >
        Render an asciinema terminal recording from a .cast file attached to
        this Confluence page.
      resource: main-attachment
      resolver:
        function: resolver
      categories:
        - media
      config:
        resource: main-attachment
        title: Recording Options
        openOnInsert: true

  # Module 3: Smart Link — enrich asciinema.org URLs with a rich preview card
  graph:smartLink:
    - key: asciinema-org-smart-link
      name: Asciinema.org Smart Link
      # Icon displayed on the Smart Link card to identify the source platform
      icon: https://asciinema.org/favicon.ico
      function: smart-link-resolver
      domains:
        - asciinema.org
      subdomains: false
      # Regex pattern matching asciinema.org recording URLs
      patterns:
        - 'https:\/\/asciinema\.org\/a\/([0-9a-zA-Z]+)(\?.*)?$'

  function:
    # Single resolver handles both macro modules (attachment URL lookup)
    - key: resolver
      handler: index.handler
    # Dedicated function for Smart Link resolution
    - key: smart-link-resolver
      handler: smartLink.handler

resources:
  # Inline macro: Custom UI React app (serves both main view and config panel)
  # Run: cd static/inline-macro && npm start   (serves on port 3000)
  - key: main-inline
    path: static/inline-macro/build
    tunnel:
      port: 3000
  # Attachment macro: Custom UI React app (serves both main view and config panel)
  # Run: cd static/attachment-macro && PORT=3001 npm start   (serves on port 3001)
  - key: main-attachment
    path: static/attachment-macro/build
    tunnel:
      port: 3001

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/2f0f0616-8ca2-46b4-93a9-cc160618faf5

permissions:
  content:
    scripts:
      # asciinema-player uses WebAssembly which requires unsafe-eval to instantiate
      - unsafe-eval
    styles:
      # asciinema-player injects inline styles for the terminal UI
      - unsafe-inline
  scopes:
    - read:confluence-content.all
  external:
    fetch:
      backend:
        - address: https://asciinema.org
