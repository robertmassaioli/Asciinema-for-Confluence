modules:
  macro:
    # Module 1: Bodied macro — paste raw .cast content directly into the body
    - key: asciinema-inline
      title: Asciinema Inline
      description: >
        Render an asciinema terminal recording by pasting the .cast file
        contents directly into the macro body.
      resource: main
      resolver:
        function: resolver
      bodyType: plain-text
      categories:
        - media
      parameters:
        - identifier: autoplay
          name:
            value: Autoplay
          type: boolean
          defaultValue: "false"
          description:
            value: Start playing automatically when the page loads.
        - identifier: loop
          name:
            value: Loop
          type: boolean
          defaultValue: "false"
          description:
            value: Loop the recording continuously.
        - identifier: speed
          name:
            value: Speed
          type: string
          defaultValue: "1"
          description:
            value: "Playback speed multiplier. 1 = normal, 2 = double speed."
        - identifier: theme
          name:
            value: Theme
          type: enum
          defaultValue: asciinema
          description:
            value: Colour theme for the terminal.
          values:
            - asciinema
            - monokai
            - solarized-dark
            - solarized-light
            - dracula
        - identifier: cols
          name:
            value: Terminal Width
          type: string
          description:
            value: Override terminal width (columns). Leave blank to use the value from the .cast file.
        - identifier: rows
          name:
            value: Terminal Height
          type: string
          description:
            value: Override terminal height (rows). Leave blank to use the value from the .cast file.
      config: true

    # Module 2: Standard macro — point at a .cast file attached to the page
    - key: asciinema-attachment
      title: Asciinema Recording
      description: >
        Render an asciinema terminal recording from a .cast file attached to
        this Confluence page.
      resource: main
      resolver:
        function: resolver
      categories:
        - media
      config:
        resource: config-attachment
        render: native
        title: Recording Options
        openOnInsert: true

  # Module 3: Smart Link — enrich asciinema.org URLs with a rich preview card
  graph:smartLink:
    - key: asciinema-org-smart-link
      name: Asciinema.org Smart Link
      # Icon displayed on the Smart Link card to identify the source platform
      icon: https://asciinema.org/favicon.ico
      function: smart-link-resolver
      domains:
        - asciinema.org
      subdomains: false
      # Regex pattern matching asciinema.org recording URLs
      patterns:
        - 'https:\/\/asciinema\.org\/a\/([0-9a-zA-Z]+)(\?.*)?$'

  function:
    # Single resolver handles both macro modules (attachment URL lookup)
    - key: resolver
      handler: index.handler
    # Dedicated function for Smart Link resolution
    - key: smart-link-resolver
      handler: smartLink.handler

resources:
  # Shared Custom UI React app for both macros — moduleKey routing in index.js
  # Run: cd static/app && npm start   (serves on port 3000)
  - key: main
    path: static/app/build
    tunnel:
      port: 3000
  # Attachment macro: UI Kit config panel (bundled by Forge directly from src)
  - key: config-attachment
    path: src/frontend/attachmentConfig.jsx

app:
  runtime:
    name: nodejs24.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/2f0f0616-8ca2-46b4-93a9-cc160618faf5

permissions:
  content:
    scripts:
      # asciinema-player uses WebAssembly which requires unsafe-eval to instantiate
      - unsafe-eval
    styles:
      # asciinema-player injects inline styles for the terminal UI
      - unsafe-inline
  scopes:
    - read:confluence-content.all
  external:
    fetch:
      backend:
        - address: https://asciinema.org
